<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EvanCore — Terraform for AI agents</title>
<style>
  :root {
    --bg: #0a0d12;
    --bg-elev: #10151c;
    --bg-term: #0d1117;
    --line: #1c2431;
    --line-strong: #2a3648;
    --text: #d8e0ea;
    --text-dim: #7c8699;
    --text-mute: #4a5468;
    --accent: #7cc4d4;
    --accent-2: #9dd7e3;
    --accent-glow: rgba(124, 196, 212, 0.28);
    --accent-soft: rgba(124, 196, 212, 0.12);
    --warn: #d4a36a;
    --ok: #7cd4a6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Cascadia Mono", "Roboto Mono", Consolas, monospace;
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    letter-spacing: 0.01em;
  }
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 1200px 600px at 50% -10%, rgba(124, 196, 212, 0.06), transparent 60%),
      radial-gradient(ellipse 900px 500px at 50% 110%, rgba(124, 196, 212, 0.04), transparent 60%),
      var(--bg);
  }
  .wrap {
    max-width: 1380px;
    margin: 0 auto;
    padding: 56px 40px 64px;
  }
  /* ---- hero ---- */
  .hero { text-align: center; margin-bottom: 40px; }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px 6px 10px;
    border: 1px solid var(--line-strong);
    border-radius: 100px;
    background: var(--bg-elev);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 26px;
  }
  .brand-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    animation: breathe 2.6s ease-in-out infinite;
  }
  .title {
    font-size: 40px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin: 0 0 14px;
    color: #eaf1fa;
  }
  .subtitle {
    font-size: 15px;
    color: var(--text-dim);
    margin: 0;
    letter-spacing: 0.01em;
  }
  .subtitle em { color: var(--accent-2); font-style: normal; }

  /* ---- stage ---- */
  .stage {
    position: relative;
    background: linear-gradient(180deg, #0c1118 0%, #0a0e14 100%);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px 32px 24px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--line-strong) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-strong) 1px, transparent 1px);
    background-size: 56px 56px;
    opacity: 0.08;
    pointer-events: none;
  }
  svg { width: 100%; height: auto; display: block; position: relative; z-index: 1; }

  /* ---- nodes ---- */
  .node rect {
    fill: var(--bg-elev);
    stroke: var(--line-strong);
    stroke-width: 1;
    transition: stroke 0.35s ease, fill 0.35s ease, filter 0.35s ease;
  }
  .node text {
    fill: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    transition: fill 0.35s ease;
  }
  .node.active rect {
    stroke: var(--accent);
    fill: #0f1822;
    filter: drop-shadow(0 0 8px var(--accent-glow));
  }
  .node.active text { fill: var(--accent-2); }
  .node.dim rect { opacity: 0.55; }
  .node.dim text { fill: var(--text-mute); }

  .artifact rect {
    fill: #0d1620;
    stroke: var(--line-strong);
    stroke-width: 1;
    stroke-dasharray: 4 4;
    transition: all 0.5s ease;
  }
  .artifact.materialized rect {
    stroke: var(--accent);
    stroke-dasharray: 0;
    fill: #0f1a26;
    filter: drop-shadow(0 0 14px var(--accent-glow));
  }
  .artifact .label {
    fill: var(--text-mute);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .artifact.materialized .label { fill: var(--accent-2); }
  .artifact .hash {
    fill: var(--text);
    font-size: 15px;
    letter-spacing: 0.02em;
  }
  .artifact .meta {
    fill: var(--text-dim);
    font-size: 12px;
  }
  .artifact .sig {
    fill: var(--ok);
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .artifact.signed .sig { opacity: 1; }

  /* ---- lines ---- */
  .line {
    fill: none;
    stroke: var(--line-strong);
    stroke-width: 1.4;
    stroke-opacity: 0.7;
  }
  .line.flow {
    stroke: var(--accent);
    stroke-dasharray: 6 540;
    stroke-dashoffset: 540;
    stroke-opacity: 0;
    animation: flowLight 1.6s ease-out forwards;
  }
  .line.lit {
    stroke: var(--accent);
    stroke-opacity: 0.55;
  }

  @keyframes flowLight {
    0%   { stroke-dashoffset: 540; stroke-opacity: 0.2; }
    35%  { stroke-opacity: 1; filter: drop-shadow(0 0 3px var(--accent-glow)); }
    85%  { stroke-opacity: 1; filter: drop-shadow(0 0 3px var(--accent-glow)); }
    100% { stroke-dashoffset: 0; stroke-opacity: 0.85; stroke-dasharray: 0; }
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50%      { opacity: 1;    transform: scale(1.25); }
  }

  /* ---- tags ---- */
  .tags {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 8px 0 36px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mute);
  }
  .tag { display: inline-flex; align-items: center; gap: 8px; }
  .tag::before {
    content: "";
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-mute);
  }
  .tag.pos::before { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
  .tag.pos { color: var(--accent-2); }

  /* ---- terminal ---- */
  .terminal {
    background: var(--bg-term);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.6);
  }
  .term-head {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    background: #0b1017;
    border-bottom: 1px solid var(--line);
    gap: 8px;
  }
  .term-dot { width: 11px; height: 11px; border-radius: 50%; background: #2a3040; }
  .term-title {
    flex: 1;
    text-align: center;
    font-size: 12px;
    color: var(--text-mute);
    letter-spacing: 0.05em;
  }
  .term-body {
    padding: 18px 20px 22px;
    min-height: 180px;
    font-size: 13px;
    line-height: 1.7;
  }
  .term-line { display: block; white-space: pre; }
  .term-line .prompt { color: var(--accent); }
  .term-line .cmd { color: var(--text); }
  .term-line.out { color: var(--text-dim); padding-left: 0; }
  .term-line.ok { color: var(--ok); }
  .term-line.evt { color: var(--accent-2); }
  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--accent);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---- foot ---- */
  .foot {
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: var(--text-mute);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .foot .sep { margin: 0 10px; color: var(--line-strong); }

  @media (max-width: 780px) {
    .wrap { padding: 32px 16px 40px; }
    .title { font-size: 28px; }
    .subtitle { font-size: 13px; }
    .tags { flex-direction: column; gap: 8px; align-items: center; }
    .stage { padding: 16px; }
  }
</style>
</head>
<body>
  <div class="wrap">

    <!-- HERO -->
    <section class="hero">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>EvanCore</span>
      </div>
      <h1 class="title">Terraform for AI agents.</h1>
      <p class="subtitle">CLI-first Harness Engineering — <em>content-addressed, signed, reversible.</em></p>
    </section>

    <!-- STAGE -->
    <section class="stage">
      <svg viewBox="0 0 1320 640" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="var(--line-strong)" />
          </marker>
        </defs>

        <!-- BUILD PATH LINES -->
        <path class="line" id="l-spec-val"  d="M 230,90 L 340,90"  marker-end="url(#arrow)"/>
        <path class="line" id="l-val-asm"   d="M 460,90 L 570,90"  marker-end="url(#arrow)"/>
        <path class="line" id="l-asm-rel"   d="M 690,90 L 800,90"  marker-end="url(#arrow)"/>
        <path class="line" id="l-rel-art"   d="M 860,115 L 880,210"/>

        <!-- OPS LINES: artifact → rollback / upgrade / promote -->
        <path class="line" id="l-art-rb"    d="M 880,330 L 580,394" marker-end="url(#arrow)"/>
        <path class="line" id="l-art-up"    d="M 880,330 L 880,394" marker-end="url(#arrow)"/>
        <path class="line" id="l-art-prom"  d="M 880,330 L 1180,394" marker-end="url(#arrow)"/>

        <!-- ENV LINES: promote → staging / prod -->
        <path class="line" id="l-prom-stg"  d="M 1160,444 L 1100,489" marker-end="url(#arrow)"/>
        <path class="line" id="l-prom-prd"  d="M 1200,444 L 1240,489" marker-end="url(#arrow)"/>

        <!-- DISTRIBUTION LINES -->
        <path class="line" id="l-pub-reg"   d="M 260,576 L 380,576"  marker-end="url(#arrow)"/>
        <path class="line" id="l-reg-pull"  d="M 500,576 L 670,576"  marker-end="url(#arrow)"/>
        <path class="line" id="l-pull-ver"  d="M 790,576 L 900,576"  marker-end="url(#arrow)"/>

        <!-- TOP ROW: build pipeline -->
        <g class="node" id="n-spec">
          <rect x="110" y="65" width="120" height="50" rx="6"/>
          <text x="170" y="95" text-anchor="middle">spec.yaml</text>
        </g>
        <g class="node" id="n-validate">
          <rect x="340" y="65" width="120" height="50" rx="6"/>
          <text x="400" y="95" text-anchor="middle">validate</text>
        </g>
        <g class="node" id="n-assemble">
          <rect x="570" y="65" width="120" height="50" rx="6"/>
          <text x="630" y="95" text-anchor="middle">assemble</text>
        </g>
        <g class="node" id="n-release">
          <rect x="800" y="65" width="120" height="50" rx="6"/>
          <text x="860" y="95" text-anchor="middle">release</text>
        </g>

        <!-- ARTIFACT (center) -->
        <g class="artifact" id="artifact">
          <rect x="740" y="210" width="280" height="120" rx="8"/>
          <text class="label" x="880" y="238" text-anchor="middle">HARNESS ARTIFACT</text>
          <text class="hash"  x="880" y="272" text-anchor="middle" id="art-hash">h-·········</text>
          <text class="meta"  x="880" y="296" text-anchor="middle" id="art-ver">av</text>
          <text class="sig"   x="880" y="318" text-anchor="middle" id="art-sig">✍ alice@acme</text>
        </g>

        <!-- OPS ROW -->
        <g class="node" id="n-rollback">
          <rect x="500" y="394" width="160" height="50" rx="6"/>
          <text x="580" y="424" text-anchor="middle">rollback</text>
        </g>
        <g class="node" id="n-upgrade">
          <rect x="800" y="394" width="160" height="50" rx="6"/>
          <text x="880" y="424" text-anchor="middle">upgrade</text>
        </g>
        <g class="node" id="n-promote">
          <rect x="1100" y="394" width="160" height="50" rx="6"/>
          <text x="1180" y="424" text-anchor="middle">promote</text>
        </g>

        <!-- ENV ROW -->
        <g class="node" id="n-staging">
          <rect x="1020" y="489" width="160" height="42" rx="6"/>
          <text x="1100" y="515" text-anchor="middle">staging</text>
        </g>
        <g class="node" id="n-prod">
          <rect x="1180" y="489" width="160" height="42" rx="6"/>
          <text x="1260" y="515" text-anchor="middle">prod</text>
        </g>

        <!-- DISTRIBUTION ROW -->
        <g class="node" id="n-publish">
          <rect x="140" y="555" width="120" height="42" rx="6"/>
          <text x="200" y="581" text-anchor="middle">publish</text>
        </g>
        <g class="node" id="n-registry">
          <rect x="380" y="555" width="120" height="42" rx="6"/>
          <text x="440" y="581" text-anchor="middle">registry</text>
        </g>
        <g class="node" id="n-pull">
          <rect x="670" y="555" width="120" height="42" rx="6"/>
          <text x="730" y="581" text-anchor="middle">pull</text>
        </g>
        <g class="node" id="n-verify">
          <rect x="900" y="555" width="120" height="42" rx="6"/>
          <text x="960" y="581" text-anchor="middle">verify</text>
        </g>
      </svg>
    </section>

    <div class="tags">
      <span class="tag">Not a runtime framework</span>
      <span class="tag">Not orchestration</span>
      <span class="tag pos">Lifecycle for agent artifacts</span>
    </div>

    <!-- TERMINAL -->
    <section class="terminal">
      <div class="term-head">
        <span class="term-dot"></span>
        <span class="term-dot"></span>
        <span class="term-dot"></span>
        <span class="term-title">evan — harness engineering</span>
      </div>
      <div class="term-body" id="term"></div>
    </section>

    <div class="foot">
      <span>github.com</span><span class="sep">/</span><span>evancore</span>
    </div>
  </div>

<script>
(() => {
  const CYCLE_MS = 15500;
  const termEl = document.getElementById('term');

  const $ = id => document.getElementById(id);
  const nodes = ['n-spec','n-validate','n-assemble','n-release','n-rollback','n-upgrade','n-promote','n-staging','n-prod','n-publish','n-registry','n-pull','n-verify'];
  const lines = ['l-spec-val','l-val-asm','l-asm-rel','l-rel-art','l-art-rb','l-art-up','l-art-prom','l-prom-stg','l-prom-prd','l-pub-reg','l-reg-pull','l-pull-ver'];

  const timers = [];
  function at(ms, fn) { timers.push(setTimeout(fn, ms)); }
  function clearTimers() { timers.forEach(clearTimeout); timers.length = 0; }

  function reset() {
    nodes.forEach(id => { const n = $(id); if (n) n.classList.remove('active','dim'); });
    lines.forEach(id => { const l = $(id); if (l) l.classList.remove('flow','lit'); });
    const art = $('artifact');
    art.classList.remove('materialized','signed');
    $('art-hash').textContent = 'h-·········';
    $('art-ver').textContent = 'av';
    $('art-sig').textContent = '✍ alice@acme';
    termEl.innerHTML = '';
  }

  function activate(id) {
    const n = $(id);
    if (n) n.classList.add('active');
  }
  function deactivate(id) {
    const n = $(id);
    if (n) n.classList.remove('active');
  }

  function flowLine(id) {
    const l = $(id);
    if (!l) return;
    l.classList.remove('flow','lit');
    void l.getBoundingClientRect();
    l.classList.add('flow');
    setTimeout(() => { l.classList.remove('flow'); l.classList.add('lit'); }, 1600);
  }

  function materializeArtifact() {
    $('artifact').classList.add('materialized');
  }

  function typeText(el, text, speed = 40, done) {
    let i = 0;
    el.textContent = '';
    const iv = setInterval(() => {
      el.textContent = text.slice(0, ++i);
      if (i >= text.length) { clearInterval(iv); done && done(); }
    }, speed);
  }

  function showHash() {
    typeText($('art-hash'), 'h-abc123f7d9e2', 45);
  }

  function showSignature() {
    $('artifact').classList.add('signed');
  }

  function rollbackEffect() {
    const el = $('art-hash');
    let i = 0;
    const iv = setInterval(() => {
      el.textContent = 'h-' + Math.random().toString(16).slice(2, 14);
      if (++i >= 6) {
        clearInterval(iv);
        el.textContent = 'h-3c21b0f8e5a4';
      }
    }, 60);
  }

  function upgradeEffect() {
    const el = $('art-hash');
    let i = 0;
    const iv = setInterval(() => {
      el.textContent = 'h-' + Math.random().toString(16).slice(2, 14);
      if (++i >= 6) {
        clearInterval(iv);
        el.textContent = 'h-5e94d6fa2b1c';
      }
    }, 60);
  }

  function writeTerm(text, kind) {
    const line = document.createElement('span');
    line.className = 'term-line' + (kind ? ' ' + kind : '');
    if (kind === 'cmd') {
      line.innerHTML = '<span class="prompt">$</span> <span class="cmd"></span>';
      const cmdEl = line.querySelector('.cmd');
      termEl.appendChild(line);
      typeText(cmdEl, text, 28);
    } else {
      line.textContent = text;
      termEl.appendChild(line);
    }
    termEl.scrollTop = termEl.scrollHeight;
  }

  function runCycle() {
    reset();

    // BUILD path
    at(300,  () => { activate('n-spec'); });
    at(700,  () => { flowLine('l-spec-val'); });
    at(1100, () => { activate('n-validate'); });
    at(1500, () => { flowLine('l-val-asm'); });
    at(1900, () => { activate('n-assemble'); });
    at(2300, () => { flowLine('l-asm-rel'); });
    at(2700, () => { activate('n-release'); });
    at(3100, () => { flowLine('l-rel-art'); });
    at(3500, () => { materializeArtifact(); });
    at(3900, () => { showHash(); });
    at(5200, () => { showSignature(); });

    // TERMINAL (build)
    at(400,  () => writeTerm('evan validate app.yaml', 'cmd'));
    at(1400, () => writeTerm('✓ app.yaml passes', 'ok'));
    at(2000, () => writeTerm('evan release app.yaml --sign alice@acme', 'cmd'));
    at(3600, () => writeTerm('📦 SPEC_RELEASED  h-abc123f7d9e2', 'evt'));
    at(4400, () => writeTerm('✍  SPEC_SIGNED    alice@acme', 'evt'));
    at(5000, () => writeTerm('🚀 HARNESS_DEPLOYED app (av)', 'evt'));

    // ROLLBACK
    at(6200, () => { activate('n-rollback'); flowLine('l-art-rb'); });
    at(6400, () => rollbackEffect());
    at(6600, () => writeTerm('evan rollback h-abc123 --yes', 'cmd'));
    at(7200, () => { deactivate('n-rollback'); writeTerm('↩  HARNESS_ROLLED_BACK  h-3c21b0f8e5a4', 'evt'); });

    // UPGRADE
    at(7500, () => { activate('n-upgrade'); flowLine('l-art-up'); });
    at(7700, () => upgradeEffect());
    at(8500, () => { deactivate('n-upgrade'); });

    // PROMOTE
    at(8900, () => { activate('n-promote'); flowLine('l-art-prom'); });
    at(9300, () => { activate('n-staging'); flowLine('l-prom-stg'); });
    at(9700, () => writeTerm('evan promote prod.yaml --from staging-app', 'cmd'));
    at(10300, () => { activate('n-prod'); flowLine('l-prom-prd'); });
    at(10800, () => writeTerm('🚀 HARNESS_DEPLOYED prod-app (promoted)', 'evt'));

    // DISTRIBUTION
    at(11400, () => { activate('n-publish'); flowLine('l-pub-reg'); });
    at(12000, () => { activate('n-registry'); flowLine('l-reg-pull'); });
    at(12600, () => { activate('n-pull'); flowLine('l-pull-ver'); });
    at(13200, () => { activate('n-verify'); });
    at(13800, () => writeTerm('✓ signature verified · trust: alice@acme', 'ok'));
  }

  runCycle();
  setInterval(() => { clearTimers(); runCycle(); }, CYCLE_MS);
})();
</script>
</body>
</html>
